<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单提交</title>
    <link rel="stylesheet" href="/css/table_style.css">
    <!-- 引入 Supabase JS 客户端 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- 页眉 -->
  <header>
    <!-- 左边：公司 Logo -->
    <div class="logo">
        <img src="/images/Logo 云飞店铺 100x40.jpg" alt="公司Logo">
    </div>
    <!-- 右边：导航栏 -->
    <nav>
      <a href="/index.html">首页</a>
      <a href="/活动通知/">活动通知</a>
      <a href="/产品介绍/">产品介绍</a>
    </nav>
  </header>

  <main>
    <div class="payment">
        <h2>请扫码支付</h2>
        <p>1、截屏或下载二维码图片；</p>
        <p>2、然后用微信或支付宝扫描对应二维码，进行支付；</p>
        <p>3、支付完成后，复制支付订单的流水号，28位或31位；</p>
        <p>4、返回本页面，将其粘贴入尾页的输入框，点击提交</p>
        <img src="/images/QR-wx.jpg" alt="微信收款二维码">
        <img src="/images/QR-zfb.jpg" alt="支付宝收款二维码">
    </div>

    <h3>商品清单</h3>
    <table>
      <thead>
        <tr>
          <th>序号</th>
          <th>商品名</th>
          <th>单价</th>
          <th>数量</th>
          <th>小计</th>
        </tr>
      </thead>
      <tbody id="cart-display">
        <!-- 购物车里的商品清单自动渲染 -->
      </tbody>
    </table>
    <h4>总价：<span id="total-price">0</span> 元</h4>

    <form id="customerForm">
      <h2>请填写支付单号及用餐方式</h2>
      <div class="form-item">
          <label for="payment_number">支付流水号</label>
          <input type="tel" id="payment_number" size="31" 
          pattern="\d{28}|\d{31}" maxlength="31" autocomplete="off" 
          placeholder="请复制支付单号28位或31位的填入" required><br>
      </div><br>
      <div class="form-item">
          <label>堂食或外带：</label>
          <select id="eat_type">
              <option value="1" selected>堂食</option>
              <option value="0">打包外带</option>
          </select>
      </div><br>
      <div class="form-item">
          <label for="address">就餐位置</label>
          <input type="text" id="address" placeholder="店内座位号">
      </div>
    </form>

    <div>
      <p id="tip" style="margin-top:15px;"></p>
      <button class="button buttonChange" type="button" 
      id="submitBtn" onclick="submitInfo()">订单提交</button>
    </div>
    </form>

  </main>
  <script src="/js/payment_submit_in.js"></script>
</body>
</html>
