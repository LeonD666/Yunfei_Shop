<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单提交</title>
    <link rel="stylesheet" href="./css/table_style.css">
    <!-- 引入 Supabase JS 客户端 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- 页眉 -->
  <header>
    <!-- 左边：公司 Logo -->
    <div class="logo">
        <img src="./images/Logo 云飞店铺 100x40.jpg" alt="公司Logo">
    </div>
    <!-- 右边：导航栏 -->
    <nav>
      <a href="/index.html">首页</a>
      <a href="./活动通知/">活动通知</a>
      <a href="./产品介绍/">产品介绍</a>
    </nav>
  </header>

  <main>
    <h2>订单提交</h2>
    <p>支付状态已验证通过，请填写收件人信息，并提交订单。</p>
    <form class="form-box" id="customerForm">
        <!-- 内容一：选择类型 -->
        <h3>收件人信息</h3>
        <div class="form-item">
            <label>用餐方式：</label>
            <select id="eat_type">
                <option value="3">自取外卖</option>
                <option value="2" selected>外卖</option>
            </select>
        </div>

        <!-- 内容二：输入项 -->
        <div class="form-item">
            <label for="name">收件人名称</label>
            <input type="text" id="name" placeholder="外卖必填，收件人姓名" required>
        </div><br>
        <div class="form-item">
            <label for="phone">收件人电话</label>
            <input type="tel" id="phone" pattern="^1[3-9]\d{9}$" maxlength="11" placeholder="外卖必填，收件人11位手机号" required>
        </div><br>
        <div class="form-item">
            <label for="address">收件人地址</label>
            <textarea rows="4" style="margin-bottom: 3px;" id="address" placeholder="收件地址或店内座位号" required></textarea>                           
        </div>
    </form>

    <h3>订购清单</h3>
    <table>
        <thead>
            <tr>
            <th>序号</th>
            <th>商品名</th>
            <th>单价</th>
            <th>数量</th>
            <th>小计</th>
            </tr>
        </thead>
        <tbody id="cart-display">
            <!-- 购物车里的商品清单自动渲染 -->
        </tbody>
    </table>
    <h4>总价：<span id="total-price">0</span> 元</h4>

    <div>
        <p id="tip" style="margin-top:15px;"></p>
        <button class="button buttonChange" type="button" 
        id="submitBtn" onclick="submitInfo()">订单提交</button>
    </div>

  </main>

  <script src="./js/submit_out.js"></script>
</body>
</html>
